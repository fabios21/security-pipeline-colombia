name: Security Pipeline Colombia - Complete Example

on:
  pull_request:
    branches: [main, master]
    paths:
      - '**/*.js'
      - '**/*.jsx'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.py'
      - '**/*.java'
      - '**/*.go'
      - '**/*.rb'
      - '**/*.php'
      - '**/*.cs'
      - '**/*.cpp'
      - '**/*.c'

env:
  TIMEZONE: America/Bogota
  LANG: es_CO.UTF-8
  LC_ALL: es_CO.UTF-8

jobs:
  security-pipeline:
    name: Security Pipeline Colombia
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Run Security Pipeline Colombia
      id: security
      uses: fabios21/security-pipeline-colombia@main
      with:
        compliance-level: 'standard'
        timezone: ${{ env.TIMEZONE }}
        report-language: 'es_CO'
        block-on-secrets: true
        block-on-critical: true
        block-on-high: true
        require-approval-on-medium: true
        report-formats: 'html,markdown,json'
        
    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          security-artifacts/
        retention-days: 30