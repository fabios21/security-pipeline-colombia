name: Security Pipeline - Basic Usage

on:
  pull_request:
    branches: [main, master]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Security Pipeline Colombia
      uses: tu-usuario/security-pipeline-colombia@v1.0.0
      with:
        compliance-level: 'ley_1581'
        timezone: 'America/Bogota'
        report-language: 'es_CO'
        block-on-secrets: true
        block-on-critical: true
        block-on-high: true
        require-approval-on-medium: true
        report-formats: 'html,markdown'
        
    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          security-report-es.html
          security-report-es.md
        retention-days: 30